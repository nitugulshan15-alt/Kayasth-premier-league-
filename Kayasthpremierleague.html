<!DOCTYPE html>
<html>
<head>
  <title>Player Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Player Registration</h2>
  <form>
    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" required>

    <label for="address">Address</label>
    <input type="text" id="address" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" required>

    <label for="age">Age</label>
    <input type="number" id="age" required>

    <label for="playerType">Player Type</label>
    <select id="playerType">
      <option>Batter</option>
      <option>Bowler</option>
      <option>All-Rounder</option>
      <option>Wicket Keeper</option>
    </select>

    <label for="matches">Matches Played</label>
    <input type="number" id="matches">

    <label for="runs">Runs Scored</label>
    <input type="number" id="runs">

    <label for="wickets">Wickets Taken</label>
    <input type="number" id="wickets">
  </form>
</body>
</html>
